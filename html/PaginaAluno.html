  <section class="buscalivros">
    <div id="painel-busca">
      <h2>Buscar Livros</h2>
      <form id="formularioBusca">
        <div class="mb-2">
          <label for="autor" class="form-label">Autor:</label>
          <input type="text" id="autor" name="autor" class="form-control form-control-sm" placeholder="Nome do autor..." />
        </div>
        <div class="mb-2">
          <label for="titulo" class="form-label">Título:</label>
          <input type="text" id="titulo" name="titulo" class="form-control form-control-sm" placeholder="Título do livro..." />
        </div>
        <div class="mb-2">
          <label for="indicacao" class="form-label">Indicação:</label>
          <select id="indicacao" name="indicacao" class="form-select form-select-sm">
            <option value="">Todas as séries</option>
            <option value="6º ano">6º ano</option>
            <option value="7º ano">7º ano</option>
            <option value="8º ano">8º ano</option>
            <option value="9º ano">9º ano</option>
            <option value="1º ano EM">1º ano EM</option>
            <option value="2º ano EM">2º ano EM</option>
            <option value="3º ano EM">3º ano EM</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="disciplina" class="form-label">Disciplina:</label>
          <select id="disciplina" name="disciplina" class="form-select form-select-sm">
            <option value="">Todas as disciplinas</option>
            <option value="Português">Português</option>
            <option value="Matemática">Matemática</option>
            <option value="História">História</option>
            <option value="Geografia">Geografia</option>
            <option value="Ciências">Ciências</option>
            <option value="Inglês">Inglês</option>
            <option value="Arte">Arte</option>
            <option value="Educação Física">Educação Física</option>
          </select>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success btn-sm w-50">Filtrar</button>
          <button type="reset" class="btn btn-secondary btn-sm w-50">Limpar Filtros</button>
        </div>
      </form>
      
      <div id="resultadosBusca" class="mt-4"></div>
    </div>
  </section>
