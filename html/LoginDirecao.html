<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Direção - Biblioteca Inah de Mello</title>
  <link rel="icon" href="../imagens/LOGO PNG_1761259869505.png" type="image/png">
  <link rel="stylesheet" href="../css/cd.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
  <div class="container bg-dark bg-opacity-75 text-white p-5 rounded shadow" style="max-width: 400px;">
    <h2 class="text-center mb-4">ACESSO DO PROFESSOR</h2>

    <form action="http://localhost:5162/api/direcao/login" method="POST"> 
      <input type="hidden" name="action" value="login">
      <div class="mb-3">
        <input type="email" class="form-control" name="email" placeholder="Email" required>
      </div>
      <div class="mb-3">
        <input type="password" class="form-control" name="senha" placeholder="Senha" required>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Entrar</button>
      </div>
    </form>
    
    <div class="text-center mt-3">
      <p><a href="../index.html" class="link-light text-decoration-none">Voltar</a></p>
    </div>
  </div>
</body>
</html>
